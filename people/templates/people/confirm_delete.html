{% extends "core/base.html" %}

{% block title %}Confirm Delete — RPT{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card border-danger border-2 shadow-sm">
      <div class="card-header bg-danger text-white fw-semibold">Confirm Delete</div>
      <div class="card-body text-center">
        <p>Are you sure you want to remove <strong>{{ obj }}</strong>?</p>
        <p class="text-muted small">This cannot be undone.</p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
        </form>
        <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
