{% extends "core/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Edit Transaction — RPT{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">Edit Transaction</h2>
  <a href="{% url 'budget_dashboard' %}" class="btn btn-outline-secondary btn-sm">Back to Budget</a>
</div>

<div class="row">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-transparent fw-semibold">
        <span class="text-muted small">{{ tx.raw_description }}</span>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
            <a href="{% url 'budget_dashboard' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
